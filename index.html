<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>トラパレ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body {
            height: 100%; width: 100%; margin: 0; padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background: #e0e4e8; overflow: hidden;
        }
        body { display: flex; flex-direction: row; }
        h2 { margin: 0 0 5px 0; font-size: 15px; color: #2c3e50; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .column-header { font-size: 11px; font-weight: bold; color: #7f8c8d; text-transform: uppercase; margin-bottom: 5px; display: block; margin-top: 10px; }
        button { cursor: pointer; border: 1px solid #ccc; background: #f8f9fa; border-radius: 4px; font-size: 13px; transition: all 0.1s; }
        button:hover { background: #e9ecef; }
        button:active { transform: translateY(1px); }
        input[type="number"], select { padding: 4px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        input[type="number"] { width: 70px; text-align: right; }
        select { width: 100%; }

        #left-col {
            width: 270px; min-width: 270px; background: #fff; border-right: 1px solid #ccc; padding: 15px;
            display: flex; flex-direction: column; gap: 5px; z-index: 10; overflow-y: auto; order: 1;
        }
        #center-col {
            flex: 1; background: #cbd3da; position: relative;
            display: flex; justify-content: center; align-items: center;
            padding: 60px 20px 20px 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1); order: 2;
            overflow: hidden;
        }
        #right-col {
            width: 270px; min-width: 270px; background: #fff; border-left: 1px solid #ccc; padding: 15px;
            display: flex; flex-direction: column; gap: 8px; z-index: 10; overflow-y: auto; order: 3;
        }
        #mobile-tabs { display: none; }
        .mobile-only { display: none; }

        .truck-btn { padding: 10px; text-align: left; display: flex; flex-direction: column; gap: 2px; width: 100%; margin-bottom: 5px; border: 1px solid #ccc; background: #fff; }
        .truck-btn strong { color: #333; font-size: 13px; }
        .truck-btn small { color: #666; font-size: 10px; }
        .truck-btn.active { background: #2c3e50; border-color: #1a252f; }
        .truck-btn.active strong { color: #fff; }
        .truck-btn.active small { color: #bbb; }
        .custom-area { background: #f1f8ff; padding: 10px; border-radius: 4px; border: 1px dashed #aaddff; margin-bottom: 10px; }
        .input-group { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; font-size: 12px; }
        .input-group label { flex: 1; color: #555; font-weight: bold; }
        .setting-box { background: #fff3cd; border: 1px solid #ffeeba; padding: 8px; border-radius: 4px; margin-bottom: 5px; }
        .setting-box.blue { background: #e8f5e9; border-color: #c8e6c9; }
        .btn-apply { width: 100%; background: #3498db; color: white; border: none; padding: 8px; margin-top: 4px; font-size: 12px; border-radius: 4px; }
        #pallet-buttons-container { display: flex; flex-wrap: wrap; gap: 5px; }
        .pallet-btn {
            padding: 10px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 1px solid #ccc; background: #fff; height: 55px;
        }
        .pallet-btn.full { width: 100%; }
        .pallet-btn.half { width: calc(50% - 2.5px); }
        .pallet-btn strong { font-size: 13px; display: block; }
        .pallet-btn small { font-size: 10px; color: #666; display: block; margin-top: 2px; }
        .action-area { display: flex; gap: 8px; margin-top: 10px; }
        .action-btn { flex: 1; padding: 10px; font-weight: bold; font-size: 12px; }
        .btn-undo { background: #fff0f0; border-color: #ffcccc; color: #c0392b; }
        .btn-clear { background: #fff3cd; border-color: #ffeeba; color: #856404; }
        #status-box { margin-top: auto; padding: 12px; background: #f1f8ff; border: 1px solid #cce5ff; border-radius: 6px; font-size: 12px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; border-bottom: 1px solid #eef; padding-bottom: 4px; }
        .breakdown { margin-top: 8px; padding-top: 8px; border-top: 1px solid #dae0e5; font-size: 11px; color: #444; line-height: 1.4; }
        .text-over { color: #d00; font-weight: bold; }
        .error-msg { color: #e74c3c; font-weight: bold; font-size: 11px; margin-top: 6px; text-align: center; min-height: 1em; }

        /* 荷台(2D) */
        #truck-bed-2d {
            background-color: #f4f4f4; border: 2px solid #333; border-top: 10px solid #2c3e50;
            position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            transition: width 0.3s, height 0.3s; box-sizing: content-box;
        }
        .bed-header { position: absolute; top: -50px; left: 0; width: 100%; text-align: center; pointer-events: none; line-height: 1.4; white-space: nowrap; }
        .header-label { font-size: 11px; color: #666; font-weight: bold; display: block; }
        .header-name { font-size: 15px; color: #2c3e50; font-weight: bold; display: block; }

        .pallet {
            position: absolute; box-sizing: border-box; display: flex;
            justify-content: center; align-items: center; flex-direction: column;
            color: #fff; font-weight: bold; border: 1px solid rgba(0,0,0,0.2);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25); z-index: 10; overflow: hidden;
            white-space: nowrap; line-height: 1.1;
        }
        .pallet.type-11 { background-color: #2980b9; }
        .pallet.type-12 { background-color: #8e44ad; }
        .pallet.type-14 { background-color: #c0392b; }
        .pallet.type-9  { background-color: #f39c12; color: #333; }
        .pallet.type-custom { background-color: #27ae60; }
        .pallet.preview { opacity: 0.6; border: 2px dashed #333; background-color: rgba(100,100,100,0.5) !important; color: #fff; z-index: 20; pointer-events: none; }
        .owner-tag {
            position: absolute; top: 0; left: 0; width: 24px; height: 24px;
            color: #fff; font-size: 12px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            border-bottom-right-radius: 4px; box-shadow: 1px 1px 2px rgba(0,0,0,0.3); z-index: 2;
        }
        .owner-tag.owner-A { background-color: #e74c3c; }
        .owner-tag.owner-B { background-color: #e67e22; }
        .owner-tag.owner-C { background-color: #2ecc71; }
        .owner-tag.owner-D { background-color: #f1c40f; color: #333; }
        .owner-tag.owner-E { background-color: #34495e; }
        .p-index { font-size: 12px; display: block; z-index: 1; }
        .p-size  { font-size: 10px; opacity: 0.9; display: block; z-index: 1; }
        .p-weight { font-size: 10px; opacity: 0.9; display: block; color: #ffeb3b; z-index: 1; }
        .height-warn {
            position: absolute; top: 2px; right: 2px;
            background: #e74c3c; color: #fff; font-size: 9px; font-weight: bold;
            padding: 1px 4px; border-radius: 3px; z-index: 30;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

        /* 2D/3D切替 */
        #view-toggle {
            position: absolute; top: 12px; right: 12px; z-index: 100;
            display: flex; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        #view-toggle button {
            padding: 6px 14px; border: none; font-size: 12px; font-weight: bold;
            background: #fff; color: #888; border-radius: 0; transition: all 0.2s;
        }
        #view-toggle button.active { background: #2c3e50; color: #fff; }

        /* 3Dキャンバス */
        #three-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none;
        }
        #three-canvas.show { display: block; }

        /* 2Dラッパー */
        #view-2d-wrapper {
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%;
        }
        #view-2d-wrapper.hide { display: none; }

        /* 高さバー */
        .height-bar-box { display: none; margin-top: 8px; padding: 8px; background: #f8f0ff; border: 1px solid #e0d0f0; border-radius: 6px; }
        .height-bar-box.show { display: block; }
        .hb-label { font-size: 11px; color: #555; margin-bottom: 4px; font-weight: bold; }
        .hb-track { width: 100%; height: 18px; background: #eee; border-radius: 9px; overflow: hidden; border: 1px solid #ccc; }
        .hb-fill { height: 100%; border-radius: 9px; transition: width 0.3s; background: linear-gradient(90deg, #2ecc71, #27ae60); }
        .hb-fill.over { background: linear-gradient(90deg, #e74c3c, #c0392b); }
        .hb-text { font-size: 11px; color: #333; margin-top: 3px; text-align: right; }
        .hb-text.over { color: #e74c3c; font-weight: bold; }

        /* 3D操作ヒント */
        #three-hint {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: rgba(0,0,0,0.6); color: #fff; padding: 4px 12px;
            border-radius: 12px; font-size: 11px; pointer-events: none; display: none;
        }
        #three-hint.show { display: block; }

        /* スマホ */
        @media screen and (max-width: 768px) {
            body { flex-direction: column !important; }
            #mobile-tabs {
                display: flex !important; height: 50px; width: 100%; flex: none;
                background: #f8f9fa; border-bottom: 1px solid #ccc; z-index: 200; order: 1;
            }
            .tab-btn {
                flex: 1; border: none; background: transparent; color: #888;
                font-weight: bold; font-size: 14px; border-bottom: 3px solid transparent; border-right: 1px solid #ddd;
            }
            .tab-btn:last-child { border-right: none; }
            body.view-truck #tab-truck, body.view-pallet #tab-pallet {
                background: #fff; color: #2c3e50; border-bottom: 3px solid #2c3e50;
            }
            #center-col {
                order: 2; height: 40%; width: 100%; flex: none;
                padding: 50px 10px 10px 10px; border-bottom: 1px solid #aaa;
                z-index: 2; background: #cbd3da; display: none;
            }
            #left-col, #right-col {
                order: 3; width: 100% !important; flex: 1; padding: 15px;
                overflow-y: auto; -webkit-overflow-scrolling: touch; border: none; display: none;
            }
            body:not(.view-pallet) #left-col { display: flex !important; }
            body:not(.view-pallet) #center-col { display: none !important; }
            body:not(.view-pallet) #right-col { display: none !important; }
            body:not(.view-pallet) #tab-truck { background: #fff; color: #2c3e50; border-bottom: 3px solid #2c3e50; }
            body.view-pallet #center-col { display: flex !important; }
            body.view-pallet #right-col { display: flex !important; }
            body.view-pallet #left-col { display: none !important; }
            .mobile-only { display: block !important; }
            .pallet[class*="owner-"] .owner-tag { display: none !important; }
            .pallet.owner-A { background-color: #e74c3c !important; color: #fff; }
            .pallet.owner-B { background-color: #e67e22 !important; color: #fff; }
            .pallet.owner-C { background-color: #2ecc71 !important; color: #fff; }
            .pallet.owner-D { background-color: #f1c40f !important; color: #333 !important; }
            .pallet.owner-E { background-color: #34495e !important; color: #fff; }
            .p-size, .p-weight { display: none !important; }
            .p-index { font-size: 18px !important; font-weight: bold; margin: auto; }
            #view-toggle { top: 8px; right: 8px; }
        }
    </style>
</head>
<body>
    <div id="mobile-tabs">
        <button class="tab-btn" id="tab-truck" onclick="switchMode('truck')">1. 荷台設定</button>
        <button class="tab-btn" id="tab-pallet" onclick="switchMode('pallet')">2. パレット配置</button>
    </div>
    <div id="left-col">
        <h2>使用する荷台を選択</h2>
        <span class="column-header" style="margin-top:0;">定型サイズ</span>
        <div id="truck-buttons"></div>
        <div class="setting-box">
            <div class="input-group">
                <label>最大積載量 (kg)</label>
                <input type="number" id="truck-capacity" value="0" onchange="updateCapacityDisplay()">
            </div>
            <div class="input-group">
                <label>荷台の高さ (mm)</label>
                <input type="number" id="truck-height" value="0" step="10" onchange="updateTruckHeight()">
            </div>
        </div>
        <span class="column-header">カスタム (mm)</span>
        <div class="custom-area">
            <div class="input-group"><label style="flex:1;">長さ(縦)</label><input type="number" id="custom-truck-l" value="8000" step="100"></div>
            <div class="input-group"><label style="flex:1;">車幅(横)</label><input type="number" id="custom-truck-w" value="2300" step="10"></div>
            <div class="input-group"><label style="flex:1;">高さ</label><input type="number" id="custom-truck-h" value="2500" step="10"></div>
            <button class="btn-apply" onclick="setCustomTruck()">適用して次へ</button>
        </div>
        <div class="mobile-only" style="margin-top:20px; text-align:center; color:#888; font-size:12px; background:#f0f0f0; padding:10px; border-radius:5px;">
            荷台を決めたら、上のタブで<br>「2. パレット配置」へ移動してください
        </div>
        <div style="height:50px;"></div>
    </div>
    <div id="center-col">
        <div id="view-toggle">
            <button id="btn-2d" class="active" onclick="setViewMode('2d')">2D</button>
            <button id="btn-3d" onclick="setViewMode('3d')">3D</button>
        </div>
        <div id="view-2d-wrapper">
            <div id="truck-bed-2d" style="display:none;"></div>
        </div>
        <canvas id="three-canvas"></canvas>
        <div id="three-hint">ドラッグで回転 / スクロールでズーム</div>
    </div>
    <div id="right-col">
        <h2>パレットを追加</h2>
        <div class="setting-box blue">
            <div class="input-group">
                <label>重量 (kg)</label>
                <input type="number" id="pallet-weight" value="0" placeholder="0">
            </div>
            <div class="input-group">
                <label>高さ (mm)</label>
                <input type="number" id="pallet-height" value="1500" step="10" placeholder="1500">
            </div>
            <div class="input-group">
                <label>荷主(ラベル)</label>
                <select id="owner-select" style="flex:1; margin-left:5px;">
                    <option value="default">指定なし</option>
                    <option value="A">荷主A (赤)</option>
                    <option value="B">荷主B (橙)</option>
                    <option value="C">荷主C (緑)</option>
                    <option value="D">荷主D (黄)</option>
                    <option value="E">荷主E (黒)</option>
                </select>
            </div>
        </div>
        <span class="column-header" style="margin-top:0;">定型パレット</span>
        <div id="pallet-buttons-container"></div>
        <span class="column-header">カスタム (mm)</span>
        <div class="custom-area">
            <div class="input-group"><label>幅(横)</label><input type="number" id="custom-pallet-w" value="1100" step="10"></div>
            <div class="input-group"><label>奥行(縦)</label><input type="number" id="custom-pallet-d" value="1100" step="10"></div>
            <button class="btn-apply" id="btn-add-custom" style="background:#27ae60;">＋ 追加</button>
        </div>
        <div class="action-area">
            <button class="action-btn btn-undo" onclick="undoLastPallet()">↩ 戻る</button>
            <button class="action-btn btn-clear" onclick="clearAll()">✖ クリア</button>
        </div>
        <div id="status-box">
            <div class="stat-row"><span>合計枚数:</span><strong id="count" style="font-size:1.2em;">0 枚</strong></div>
            <div class="stat-row"><span>積載重量:</span><span id="weight-display" style="text-align:right;">0 / 0 kg (0%)</span></div>
            <div class="stat-row"><span>残り長さ (L/R):</span><span id="remain-len">- / -</span></div>
            <div class="height-bar-box" id="height-bar-box">
                <div class="hb-label">最大パレット高さ vs 荷台高さ</div>
                <div class="hb-track"><div class="hb-fill" id="hb-fill" style="width:0%"></div></div>
                <div class="hb-text" id="hb-text">- / - mm</div>
            </div>
            <div class="breakdown" id="breakdown-list">(内訳)</div>
            <div id="error-msg" class="error-msg"></div>
        </div>
        <div style="height:50px;"></div>
    </div>

<script>
(function() {
    "use strict";

    /* ============================================================
       データ定義
       ============================================================ */
    var TRUCKS = [
        { name: "2t 標準",    L: 3100, W: 1780, H: 2000, cap: 2000 },
        { name: "2t ワイドL", L: 4310, W: 2095, H: 2000, cap: 2000 },
        { name: "4t 標準",    L: 5935, W: 2185, H: 2400, cap: 3950 },
        { name: "4t ワイド",  L: 5935, W: 2365, H: 2400, cap: 3850 },
        { name: "10t ワイド", L: 9640, W: 2410, H: 2500, cap: 14700 }
    ];
    var PALLETS = [
        { id: "11",  name: "11型 正方形", w: 1100, d: 1100, typeClass: "type-11", widthType: "full" },
        { id: "12v", name: "12型 縦",     w: 1000, d: 1200, typeClass: "type-12", widthType: "half" },
        { id: "12h", name: "12型 横",     w: 1200, d: 1000, typeClass: "type-12", widthType: "half" },
        { id: "14v", name: "14型 縦",     w: 1100, d: 1400, typeClass: "type-14", widthType: "half" },
        { id: "14h", name: "14型 横",     w: 1400, d: 1100, typeClass: "type-14", widthType: "half" },
        { id: "9v",  name: "9型 縦",      w: 900,  d: 1100, typeClass: "type-9",  widthType: "half" },
        { id: "9h",  name: "9型 横",      w: 1100, d: 900,  typeClass: "type-9",  widthType: "half" }
    ];
    var TYPE_COLORS = {
        "type-11": 0x2980b9, "type-12": 0x8e44ad, "type-14": 0xc0392b,
        "type-9": 0xf39c12, "type-custom": 0x27ae60
    };
    var TYPE_COLORS_CSS = {
        "type-11": "#2980b9", "type-12": "#8e44ad", "type-14": "#c0392b",
        "type-9": "#f39c12", "type-custom": "#27ae60"
    };
    var OWNER_COLORS = { A: 0xe74c3c, B: 0xe67e22, C: 0x2ecc71, D: 0xf1c40f, E: 0x34495e };
    var OWNER_COLORS_CSS = { A: "#e74c3c", B: "#e67e22", C: "#2ecc71", D: "#f1c40f", E: "#34495e" };

    /* ============================================================
       状態
       ============================================================ */
    var currentScale = 0.085;
    var viewMode = "2d";
    var state = {
        currentTruck: null, history: [], truckIndex: -1,
        currentCapacity: 0, currentTruckHeight: 0
    };

    /* ============================================================
       DOM
       ============================================================ */
    var $ = function(id) { return document.getElementById(id); };
    var dom = {
        body: document.body,
        centerCol: $("center-col"),
        truckBed2d: $("truck-bed-2d"),
        view2dWrapper: $("view-2d-wrapper"),
        threeCanvas: $("three-canvas"),
        threeHint: $("three-hint"),
        truckBtns: $("truck-buttons"),
        palletBtnsContainer: $("pallet-buttons-container"),
        count: $("count"),
        remainLen: $("remain-len"),
        weightDisplay: $("weight-display"),
        breakdown: $("breakdown-list"),
        errorMsg: $("error-msg"),
        customTruckL: $("custom-truck-l"),
        customTruckW: $("custom-truck-w"),
        customTruckH: $("custom-truck-h"),
        truckCapacity: $("truck-capacity"),
        truckHeight: $("truck-height"),
        customPalletW: $("custom-pallet-w"),
        customPalletD: $("custom-pallet-d"),
        palletWeight: $("pallet-weight"),
        palletHeight: $("pallet-height"),
        ownerSelect: $("owner-select"),
        btnAddCustom: $("btn-add-custom"),
        heightBarBox: $("height-bar-box"),
        hbFill: $("hb-fill"),
        hbText: $("hb-text"),
        btn2d: $("btn-2d"),
        btn3d: $("btn-3d")
    };

    function isMobile() { return window.innerWidth <= 768; }

    /* ============================================================
       Three.js セットアップ
       ============================================================ */
    var scene, camera, renderer, orbitControls;
    var threeGroup = null; // 荷台+パレットのグループ
    var animFrameId = null;

    function initThree() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xcbd3da);

        camera = new THREE.PerspectiveCamera(45, 1, 1, 100000);
        camera.position.set(5000, 8000, 8000);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ canvas: dom.threeCanvas, antialias: true, alpha: false });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.sortObjects = true;

        // ライト
        var ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        var dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(5000, 10000, 7000);
        scene.add(dirLight);

        // OrbitControls (インラインミニ実装)
        orbitControls = createOrbitControls(camera, dom.threeCanvas);
    }

    /* --- 簡易 OrbitControls --- */
    function createOrbitControls(cam, domEl) {
        var ctrl = {
            target: new THREE.Vector3(0, 0, 0),
            enabled: true,
            _spherical: new THREE.Spherical(),
            _sphericalDelta: new THREE.Spherical(),
            _scale: 1,
            _panOffset: new THREE.Vector3(),
            _rotateStart: new THREE.Vector2(),
            _panStart: new THREE.Vector2(),
            _pointers: [],
            _state: 0 // 0=none, 1=rotate, 2=pan
        };

        function getZoomScale() { return Math.pow(0.95, 1); }

        function rotateLeft(angle) { ctrl._sphericalDelta.theta -= angle; }
        function rotateUp(angle) { ctrl._sphericalDelta.phi -= angle; }

        function panLeft(dist, objectMatrix) {
            var v = new THREE.Vector3();
            v.setFromMatrixColumn(objectMatrix, 0);
            v.multiplyScalar(-dist);
            ctrl._panOffset.add(v);
        }
        function panUp(dist, objectMatrix) {
            var v = new THREE.Vector3();
            v.setFromMatrixColumn(objectMatrix, 1);
            v.multiplyScalar(dist);
            ctrl._panOffset.add(v);
        }
        function pan(dx, dy) {
            var el = domEl;
            var offset = new THREE.Vector3().copy(cam.position).sub(ctrl.target);
            var targetDist = offset.length();
            targetDist *= Math.tan((cam.fov / 2) * Math.PI / 180.0);
            panLeft(2 * dx * targetDist / el.clientHeight, cam.matrix);
            panUp(2 * dy * targetDist / el.clientHeight, cam.matrix);
        }

        ctrl.update = function() {
            var offset = new THREE.Vector3();
            var quat = new THREE.Quaternion().setFromUnitVectors(cam.up, new THREE.Vector3(0, 1, 0));
            var quatInverse = quat.clone().invert();

            offset.copy(cam.position).sub(ctrl.target);
            offset.applyQuaternion(quat);
            ctrl._spherical.setFromVector3(offset);

            ctrl._spherical.theta += ctrl._sphericalDelta.theta;
            ctrl._spherical.phi += ctrl._sphericalDelta.phi;
            ctrl._spherical.phi = Math.max(0.05, Math.min(Math.PI - 0.05, ctrl._spherical.phi));
            ctrl._spherical.radius *= ctrl._scale;
            ctrl._spherical.radius = Math.max(500, Math.min(50000, ctrl._spherical.radius));
            ctrl._spherical.makeSafe();

            ctrl.target.add(ctrl._panOffset);
            offset.setFromSpherical(ctrl._spherical);
            offset.applyQuaternion(quatInverse);
            cam.position.copy(ctrl.target).add(offset);
            cam.lookAt(ctrl.target);

            ctrl._sphericalDelta.set(0, 0, 0);
            ctrl._scale = 1;
            ctrl._panOffset.set(0, 0, 0);
        };

        // イベント
        function onPointerDown(e) {
            if (!ctrl.enabled) return;
            if (e.button === 0) {
                ctrl._state = 1;
                ctrl._rotateStart.set(e.clientX, e.clientY);
            } else if (e.button === 2) {
                ctrl._state = 2;
                ctrl._panStart.set(e.clientX, e.clientY);
            }
            domEl.setPointerCapture(e.pointerId);
        }
        function onPointerMove(e) {
            if (!ctrl.enabled || ctrl._state === 0) return;
            if (ctrl._state === 1) {
                var rotateSensitivity = 2 * Math.PI / domEl.clientHeight;
                rotateLeft((e.clientX - ctrl._rotateStart.x) * rotateSensitivity);
                rotateUp((e.clientY - ctrl._rotateStart.y) * rotateSensitivity);
                ctrl._rotateStart.set(e.clientX, e.clientY);
            } else if (ctrl._state === 2) {
                pan(e.clientX - ctrl._panStart.x, e.clientY - ctrl._panStart.y);
                ctrl._panStart.set(e.clientX, e.clientY);
            }
        }
        function onPointerUp(e) {
            ctrl._state = 0;
            domEl.releasePointerCapture(e.pointerId);
        }
        function onWheel(e) {
            if (!ctrl.enabled) return;
            e.preventDefault();
            if (e.deltaY > 0) { ctrl._scale /= getZoomScale(); }
            else { ctrl._scale *= getZoomScale(); }
        }
        function onContextMenu(e) { e.preventDefault(); }

        // タッチ対応
        var touchStartDist = 0;
        var touchStartAngle = 0;
        function onTouchStart(e) {
            if (!ctrl.enabled) return;
            if (e.touches.length === 1) {
                ctrl._state = 1;
                ctrl._rotateStart.set(e.touches[0].clientX, e.touches[0].clientY);
            } else if (e.touches.length === 2) {
                ctrl._state = 3; // pinch
                var dx = e.touches[0].clientX - e.touches[1].clientX;
                var dy = e.touches[0].clientY - e.touches[1].clientY;
                touchStartDist = Math.sqrt(dx * dx + dy * dy);
            }
        }
        function onTouchMove(e) {
            if (!ctrl.enabled) return;
            e.preventDefault();
            if (ctrl._state === 1 && e.touches.length === 1) {
                var rs = 2 * Math.PI / domEl.clientHeight;
                rotateLeft((e.touches[0].clientX - ctrl._rotateStart.x) * rs);
                rotateUp((e.touches[0].clientY - ctrl._rotateStart.y) * rs);
                ctrl._rotateStart.set(e.touches[0].clientX, e.touches[0].clientY);
            } else if (ctrl._state === 3 && e.touches.length === 2) {
                var dx = e.touches[0].clientX - e.touches[1].clientX;
                var dy = e.touches[0].clientY - e.touches[1].clientY;
                var dist = Math.sqrt(dx * dx + dy * dy);
                var ratio = touchStartDist / dist;
                ctrl._scale *= ratio;
                touchStartDist = dist;
            }
        }
        function onTouchEnd(e) { ctrl._state = 0; }

        domEl.addEventListener("pointerdown", onPointerDown);
        domEl.addEventListener("pointermove", onPointerMove);
        domEl.addEventListener("pointerup", onPointerUp);
        domEl.addEventListener("wheel", onWheel, { passive: false });
        domEl.addEventListener("contextmenu", onContextMenu);
        domEl.addEventListener("touchstart", onTouchStart, { passive: false });
        domEl.addEventListener("touchmove", onTouchMove, { passive: false });
        domEl.addEventListener("touchend", onTouchEnd);

        ctrl.update();
        return ctrl;
    }

    function resizeThreeRenderer() {
        var w = dom.centerCol.clientWidth;
        var h = dom.centerCol.clientHeight;
        if (w <= 0 || h <= 0) return;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    }

    function startThreeLoop() {
        if (animFrameId) return;
        function loop() {
            animFrameId = requestAnimationFrame(loop);
            if (orbitControls) orbitControls.update();
            renderer.render(scene, camera);
        }
        loop();
    }
    function stopThreeLoop() {
        if (animFrameId) {
            cancelAnimationFrame(animFrameId);
            animFrameId = null;
        }
    }

    /* ============================================================
       3Dシーン構築
       ============================================================ */
    function build3DScene(layoutResult) {
        // 既存グループを消す
        if (threeGroup) {
            scene.remove(threeGroup);
            disposeGroup(threeGroup);
        }
        threeGroup = new THREE.Group();

        if (!state.currentTruck) { scene.add(threeGroup); return; }

        var truck = state.currentTruck;
        var truckH = state.currentTruckHeight || 0;
        var items = layoutResult.items || [];

        // --- スケール: mm単位をそのまま使用 ---
        var tW = truck.W;  // X軸 (横)
        var tL = truck.L;  // Z軸 (奥行き=長さ)
        var tH = truckH;   // Y軸 (高さ)

        // 荷台の中心を原点にオフセット
        var offX = -tW / 2;
        var offZ = -tL / 2;

        // --- 荷台の床 (薄いグレーの面) ---
        var floorGeo = new THREE.PlaneGeometry(tW, tL);
        var floorMat = new THREE.MeshBasicMaterial({ color: 0xdddddd, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
        var floorMesh = new THREE.Mesh(floorGeo, floorMat);
        floorMesh.rotation.x = -Math.PI / 2;
        floorMesh.position.set(0, 0, 0);
        threeGroup.add(floorMesh);

        // --- 荷台のワイヤーフレーム (高さが設定されている場合) ---
        if (tH > 0) {
            var boxGeo = new THREE.BoxGeometry(tW, tH, tL);
            var edges = new THREE.EdgesGeometry(boxGeo);
            var lineMat = new THREE.LineBasicMaterial({ color: 0x2c3e50, linewidth: 2 });
            var wireframe = new THREE.LineSegments(edges, lineMat);
            wireframe.position.set(0, tH / 2, 0);
            threeGroup.add(wireframe);
            boxGeo.dispose();
        }

        // --- パレット描画 ---
        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            var pH = item.height || 1500;
            var isOver = tH > 0 && pH > tH;
            var color = getColor3D(item.typeClass, item.owner);

            // BoxGeometry (幅=w, 高さ=height, 奥行き=d)
            var palGeo = new THREE.BoxGeometry(item.w, pH, item.d);

            // 半透明面
            var palMat = new THREE.MeshPhongMaterial({
                color: color,
                transparent: true,
                opacity: 0.55,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            var palMesh = new THREE.Mesh(palGeo, palMat);

            // 輪郭線
            var palEdges = new THREE.EdgesGeometry(palGeo);
            var palLineMat = new THREE.LineBasicMaterial({
                color: isOver ? 0xe74c3c : darkenHex(color, 60),
                linewidth: 1
            });
            var palLine = new THREE.LineSegments(palEdges, palLineMat);

            // 位置計算: 左下手前を基準にmm座標→中心座標に変換
            var cx = offX + item.x + item.w / 2;
            var cy = pH / 2;  // 床上にピッタリ載る
            var cz = offZ + item.y + item.d / 2;

            palMesh.position.set(cx, cy, cz);
            palLine.position.set(cx, cy, cz);

            // 高さ超過なら赤い枠線を太く
            if (isOver) {
                var overGeo = new THREE.BoxGeometry(item.w + 10, pH + 10, item.d + 10);
                var overEdges = new THREE.EdgesGeometry(overGeo);
                var overLineMat = new THREE.LineBasicMaterial({ color: 0xe74c3c, linewidth: 2 });
                var overLine = new THREE.LineSegments(overEdges, overLineMat);
                overLine.position.set(cx, cy, cz);
                threeGroup.add(overLine);
                overGeo.dispose();
            }

            // 番号をスプライトで表示
            var label = createTextSprite(String(item.index), isOver ? "#e74c3c" : "#ffffff", Math.min(item.w, item.d) * 0.6);
            label.position.set(cx, pH + 80, cz);
            threeGroup.add(label);

            threeGroup.add(palMesh);
            threeGroup.add(palLine);
        }

        // --- カメラ位置を荷台のサイズに合わせる ---
        var maxDim = Math.max(tW, tL, tH || 2000);
        camera.position.set(maxDim * 0.8, maxDim * 0.9, maxDim * 1.0);
        orbitControls.target.set(0, (tH || 1000) / 3, 0);
        orbitControls.update();

        scene.add(threeGroup);
    }

    function getColor3D(typeClass, owner) {
        if (owner && owner !== "default" && OWNER_COLORS[owner] !== undefined) return OWNER_COLORS[owner];
        return TYPE_COLORS[typeClass] || 0x888888;
    }

    function darkenHex(color, amt) {
        var r = Math.max(0, ((color >> 16) & 0xFF) - amt);
        var g = Math.max(0, ((color >> 8) & 0xFF) - amt);
        var b = Math.max(0, (color & 0xFF) - amt);
        return (r << 16) | (g << 8) | b;
    }

    function createTextSprite(text, color, size) {
        var canvas = document.createElement("canvas");
        var sz = 128;
        canvas.width = sz;
        canvas.height = sz;
        var ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, sz, sz);
        ctx.fillStyle = color;
        ctx.font = "bold 80px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, sz / 2, sz / 2);

        var texture = new THREE.CanvasTexture(canvas);
        var mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
        var sprite = new THREE.Sprite(mat);
        sprite.scale.set(size, size, 1);
        return sprite;
    }

    function disposeGroup(group) {
        group.traverse(function(obj) {
            if (obj.geometry) obj.geometry.dispose();
            if (obj.material) {
                if (obj.material.map) obj.material.map.dispose();
                obj.material.dispose();
            }
        });
    }

    /* ============================================================
       スマホタブ / 2D-3D切替
       ============================================================ */
    window.switchMode = function(mode) {
        if (mode === "truck") {
            dom.body.classList.remove("view-pallet");
        } else {
            dom.body.classList.add("view-pallet");
            setTimeout(onResize, 50);
        }
    };

    window.setViewMode = function(mode) {
        viewMode = mode;
        dom.btn2d.classList.toggle("active", mode === "2d");
        dom.btn3d.classList.toggle("active", mode === "3d");
        dom.heightBarBox.classList.toggle("show", mode === "3d");

        if (mode === "3d") {
            dom.view2dWrapper.classList.add("hide");
            dom.threeCanvas.classList.add("show");
            dom.threeHint.classList.add("show");
            resizeThreeRenderer();
            startThreeLoop();
            recalculateAndRender();
        } else {
            dom.view2dWrapper.classList.remove("hide");
            dom.threeCanvas.classList.remove("show");
            dom.threeHint.classList.remove("show");
            stopThreeLoop();
            onResize();
        }
    };

    /* ============================================================
       リサイズ
       ============================================================ */
    function onResize() {
        if (state.currentTruck) {
            if (viewMode === "2d") {
                calculateAutoScale();
                updateTruckView2D();
                recalculateAndRender();
            } else {
                resizeThreeRenderer();
            }
        }
    }
    function calculateAutoScale() {
        if (!state.currentTruck) return;
        var padH = isMobile() ? 60 : 80;
        var padW = 40;
        var cH = dom.centerCol.clientHeight - padH;
        var cW = dom.centerCol.clientWidth - padW;
        if (cH <= 0 || cW <= 0) return;
        var sH = cH / state.currentTruck.L;
        var sW = cW / state.currentTruck.W;
        currentScale = Math.min(sH, sW) * 0.90;
    }

    /* ============================================================
       ボタン生成
       ============================================================ */
    function createButtons() {
        TRUCKS.forEach(function(t, i) {
            var btn = document.createElement("button");
            btn.className = "truck-btn";
            btn.innerHTML = "<strong>" + t.name + "</strong><small>" + t.L + "x" + t.W + " H" + t.H + "</small>";
            btn.onclick = function() { selectTruck(i, btn); };
            dom.truckBtns.appendChild(btn);
        });
        PALLETS.forEach(function(p) {
            var btn = document.createElement("button");
            var cls = (p.widthType === "full") ? "full" : "half";
            btn.className = "pallet-btn " + cls;
            btn.innerHTML = "<strong>" + p.name.replace("型 ", "型<br>") + "</strong><small>" + p.w + "x" + p.d + "</small>";
            btn.onclick = function() { addPalletRequest(p); };
            btn.onmouseenter = function() { if (!isMobile()) showPreview(p); };
            btn.onmouseleave = function() { hidePreview(); };
            dom.palletBtnsContainer.appendChild(btn);
        });
    }
    function setupCustomEvents() {
        dom.btnAddCustom.onclick = function() {
            var w = parseInt(dom.customPalletW.value) || 0;
            var d = parseInt(dom.customPalletD.value) || 0;
            if (w <= 0 || d <= 0) return;
            addPalletRequest({ id: "custom", name: "カスタム(" + w + "x" + d + ")", w: w, d: d, typeClass: "type-custom" });
        };
        dom.btnAddCustom.onmouseenter = function() {
            if (isMobile()) return;
            var w = parseInt(dom.customPalletW.value) || 0;
            var d = parseInt(dom.customPalletD.value) || 0;
            if (w > 0 && d > 0) showPreview({ id: "custom", name: "Custom", w: w, d: d, typeClass: "type-custom" });
        };
        dom.btnAddCustom.onmouseleave = function() { hidePreview(); };
    }

    /* ============================================================
       トラック選択
       ============================================================ */
    window.updateCapacityDisplay = function() {
        state.currentCapacity = parseInt(dom.truckCapacity.value) || 0;
        recalculateAndRender();
    };
    window.updateTruckHeight = function() {
        state.currentTruckHeight = parseInt(dom.truckHeight.value) || 0;
        recalculateAndRender();
    };

    function selectTruck(index, btnElem) {
        var t = TRUCKS[index];
        state.currentTruck = t;
        state.truckIndex = index;
        state.currentCapacity = t.cap;
        state.currentTruckHeight = t.H;
        dom.truckCapacity.value = t.cap;
        dom.truckHeight.value = t.H;
        clearAllLogic();
        var btns = dom.truckBtns.children;
        for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
        if (btnElem) btnElem.classList.add("active");
        setTimeout(function() {
            calculateAutoScale();
            updateTruckView2D();
            recalculateAndRender();
        }, 50);
    }

    window.setCustomTruck = function() {
        var L = parseInt(dom.customTruckL.value);
        var W = parseInt(dom.customTruckW.value);
        var H = parseInt(dom.customTruckH.value) || 2500;
        if (!L || !W || L <= 0 || W <= 0) { showError("サイズNG"); return; }
        state.currentTruck = { name: "カスタム荷台", L: L, W: W, H: H };
        state.truckIndex = -1;
        state.currentCapacity = 0;
        state.currentTruckHeight = H;
        dom.truckCapacity.value = 0;
        dom.truckHeight.value = H;
        clearAllLogic();
        var btns = dom.truckBtns.children;
        for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
        setTimeout(function() {
            calculateAutoScale();
            updateTruckView2D();
            recalculateAndRender();
        }, 50);
    };

    /* ============================================================
       パレット追加
       ============================================================ */
    function addPalletRequest(proto) {
        if (!state.currentTruck) {
            if (isMobile()) { showError("◀ 荷台を選んでください"); window.switchMode("truck"); }
            else { showError("◀ 荷台を選択してください"); }
            return;
        }
        var w = parseInt(dom.palletWeight.value) || 0;
        var h = parseInt(dom.palletHeight.value) || 1500;
        var o = dom.ownerSelect.value;
        var newP = { id: proto.id, name: proto.name, w: proto.w, d: proto.d, typeClass: proto.typeClass, weight: w, height: h, owner: o };
        var newHist = state.history.concat([newP]);
        var result = calculateLayout(state.currentTruck, newHist);
        if (result.success) {
            state.history = newHist;
            renderAll(result);
            showError("");
        } else {
            showError("長さオーバーです");
        }
    }

    window.undoLastPallet = function() {
        if (state.history.length === 0) return;
        state.history.pop();
        recalculateAndRender();
        showError("");
    };
    window.clearAll = function() {
        if (!state.currentTruck) return;
        clearAllLogic();
    };
    function clearAllLogic() {
        state.history = [];
        recalculateAndRender();
        showError("");
    }

    /* ============================================================
       レイアウト計算 (変更なし)
       ============================================================ */
    function calculateLayout(truck, palletList) {
        var placedItems = [];
        var leftY = 0, rightY = 0;
        for (var i = 0; i < palletList.length; i++) {
            var p = palletList[i];
            var x, y;
            if (p.w * 2 <= truck.W) {
                if (leftY <= rightY) {
                    x = 0; y = leftY;
                    if (y + p.d > truck.L) return { success: false };
                    leftY += p.d;
                } else {
                    x = truck.W - p.w; y = rightY;
                    if (y + p.d > truck.L) return { success: false };
                    rightY += p.d;
                }
            } else {
                var startY = Math.max(leftY, rightY);
                y = startY; x = (truck.W - p.w) / 2;
                if (y + p.d > truck.L) return { success: false };
                leftY = y + p.d; rightY = y + p.d;
            }
            placedItems.push({
                x: x, y: y, w: p.w, d: p.d, name: p.name,
                typeClass: p.typeClass, index: i + 1,
                weight: p.weight || 0, height: p.height || 1500, owner: p.owner
            });
        }
        return { success: true, items: placedItems, usedLength: Math.max(leftY, rightY), leftY: leftY, rightY: rightY };
    }

    /* ============================================================
       プレビュー (2Dのみ)
       ============================================================ */
    function showPreview(pallet) {
        if (!state.currentTruck || viewMode !== "2d") return;
        var previewHist = state.history.concat([pallet]);
        var result = calculateLayout(state.currentTruck, previewHist);
        hidePreview();
        if (result.success) {
            var item = result.items[result.items.length - 1];
            var el = document.createElement("div");
            el.id = "preview-ghost";
            el.className = "pallet preview";
            el.style.left = (item.x * currentScale) + "px";
            el.style.top  = (item.y * currentScale) + "px";
            el.style.width = (item.w * currentScale) + "px";
            el.style.height = (item.d * currentScale) + "px";
            el.textContent = "NEXT";
            dom.truckBed2d.appendChild(el);
        }
    }
    function hidePreview() {
        var g = document.getElementById("preview-ghost");
        if (g) g.parentNode.removeChild(g);
    }

    /* ============================================================
       再計算＆描画
       ============================================================ */
    function recalculateAndRender() {
        hidePreview();
        if (!state.currentTruck) {
            dom.truckBed2d.innerHTML = "";
            dom.count.textContent = "0 枚";
            dom.remainLen.textContent = "- / -";
            dom.weightDisplay.textContent = "0 / 0 kg (0%)";
            dom.breakdown.innerHTML = "(内訳)";
            updateHeightBar(0, 0);
            if (viewMode === "3d") build3DScene({ items: [] });
            return;
        }
        var result = calculateLayout(state.currentTruck, state.history);
        renderAll(result);
    }

    function renderAll(result) {
        // 2D描画
        render2D(result);
        // 3D描画
        if (viewMode === "3d") {
            build3DScene(result);
        }
        // ステータス更新
        updateStatus(result);
    }

    function updateTruckView2D() {
        if (!state.currentTruck) return;
        dom.truckBed2d.style.display = "block";
        dom.truckBed2d.style.width = (state.currentTruck.W * currentScale) + "px";
        dom.truckBed2d.style.height = (state.currentTruck.L * currentScale) + "px";
    }

    /* ============================================================
       2D描画
       ============================================================ */
    function render2D(result) {
        dom.truckBed2d.innerHTML = "";
        if (state.currentTruck) {
            var hdr = document.createElement("div");
            hdr.className = "bed-header";
            var hText = state.currentTruckHeight > 0 ? " H" + state.currentTruckHeight : "";
            hdr.innerHTML = '<span class="header-label">運転席側 (奥)</span><span class="header-name">' +
                state.currentTruck.name + " (" + state.currentTruck.L + "x" + state.currentTruck.W + hText + ')</span>';
            dom.truckBed2d.appendChild(hdr);
        }
        var items = result.items || [];
        var truckH = state.currentTruckHeight || 0;
        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            var isOver = truckH > 0 && item.height > truckH;
            var el = document.createElement("div");
            var cls = "pallet " + item.typeClass;
            if (item.owner && item.owner !== "default") cls += " owner-" + item.owner;
            el.className = cls;
            el.style.left   = (item.x * currentScale) + "px";
            el.style.top    = (item.y * currentScale) + "px";
            el.style.width  = (item.w * currentScale) + "px";
            el.style.height = (item.d * currentScale) + "px";
            if (isOver) { el.style.outline = "2px solid #e74c3c"; el.style.outlineOffset = "-2px"; }
            var wt = (item.weight > 0) ? item.weight + "kg" : "";
            var ow = "";
            if (item.owner && item.owner !== "default") {
                ow = '<div class="owner-tag owner-' + item.owner + '">' + item.owner + '</div>';
            }
            var hi = item.height > 0 ? "H" + item.height : "";
            el.innerHTML = ow +
                '<span class="p-index">' + item.index + '</span>' +
                '<span class="p-size">' + item.w + 'x' + item.d + ' ' + hi + '</span>' +
                '<span class="p-weight">' + wt + '</span>' +
                (isOver ? '<span class="height-warn">高さ超</span>' : '');
            dom.truckBed2d.appendChild(el);
        }
    }

    /* ============================================================
       ステータス更新
       ============================================================ */
    function updateStatus(result) {
        var items = result.items || [];
        var totalWeight = 0;
        var maxPalletH = 0;
        for (var i = 0; i < items.length; i++) {
            totalWeight += items[i].weight;
            if (items[i].height > maxPalletH) maxPalletH = items[i].height;
        }
        var truckH = state.currentTruckHeight || 0;

        dom.count.textContent = items.length + " 枚";
        var cap = state.currentCapacity || 0;
        var pct = (cap > 0) ? Math.round((totalWeight / cap) * 100) : 0;
        var ws = totalWeight + " / " + cap + " kg (" + pct + "%)";
        if (cap > 0 && totalWeight > cap) {
            dom.weightDisplay.innerHTML = ws + ' <span style="color:red;font-weight:bold;">(OVER)</span>';
            dom.weightDisplay.classList.add("text-over");
        } else {
            dom.weightDisplay.textContent = ws;
            dom.weightDisplay.classList.remove("text-over");
        }
        if (state.currentTruck) {
            var remL = Math.max(0, state.currentTruck.L - (result.leftY || 0));
            var remR = Math.max(0, state.currentTruck.L - (result.rightY || 0));
            dom.remainLen.textContent = "L:" + remL + " / R:" + remR;
        }
        updateHeightBar(maxPalletH, truckH);
        // 内訳
        if (items.length === 0) {
            dom.breakdown.innerHTML = "パレットなし";
        } else {
            var counts = {};
            for (var j = 0; j < items.length; j++) {
                var nm = items[j].name;
                if (items[j].owner && items[j].owner !== "default") nm += " (荷主" + items[j].owner + ")";
                counts[nm] = (counts[nm] || 0) + 1;
            }
            var parts = [];
            for (var key in counts) {
                if (counts.hasOwnProperty(key)) {
                    parts.push("<div>" + key + ": <strong>" + counts[key] + "</strong></div>");
                }
            }
            dom.breakdown.innerHTML = parts.join("");
        }
    }

    function updateHeightBar(maxH, truckH) {
        if (truckH > 0 && maxH > 0) {
            var pct = Math.round((maxH / truckH) * 100);
            dom.hbFill.style.width = Math.min(pct, 100) + "%";
            var isOver = maxH > truckH;
            dom.hbFill.className = "hb-fill" + (isOver ? " over" : "");
            dom.hbText.className = "hb-text" + (isOver ? " over" : "");
            dom.hbText.textContent = maxH + " / " + truckH + " mm (" + pct + "%)" + (isOver ? " OVER!" : "");
        } else {
            dom.hbFill.style.width = "0%";
            dom.hbFill.className = "hb-fill";
            dom.hbText.className = "hb-text";
            dom.hbText.textContent = "- / - mm";
        }
    }

    function showError(msg) { dom.errorMsg.textContent = msg; }

    /* ============================================================
       初期化
       ============================================================ */
    initThree();
    createButtons();
    setupCustomEvents();
    window.addEventListener("resize", onResize);

})();
</script>
</body>
</html>
